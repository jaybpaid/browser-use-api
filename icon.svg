<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  
  <!-- Browser window -->
  <rect x="60" y="100" width="392" height="312" rx="20" fill="#1a1a2e"/>
  <rect x="60" y="100" width="392" height="40" rx="20" fill="#2d2d44"/>
  <rect x="60" y="120" width="392" height="20" fill="#2d2d44"/>
  
  <!-- Window controls -->
  <circle cx="90" cy="120" r="10" fill="#ff5f56"/>
  <circle cx="120" cy="120" r="10" fill="#ffbd2e"/>
  <circle cx="150" cy="120" r="10" fill="#27c93f"/>
  
  <!-- AI brain / spark -->
  <circle cx="256" cy="220" r="60" fill="url(#glass)" opacity="0.9"/>
  <circle cx="256" cy="220" r="40" fill="#1a1a2e"/>
  <circle cx="256" cy="220" r="30" fill="url(#glass)"/>
  
  <!-- Spark lines -->
  <line x1="256" y1="140" x2="256" y2="160" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
  <line x1="256" y1="280" x2="256" y2="300" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
  <line x1="180" y1="220" x2="200" y2="220" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
  <line x1="312" y1="220" x2="332" y2="220" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Diagonal sparks -->
  <line x1="198" y1="162" x2="212" y2="176" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
  <line x1="300" y1="264" x2="314" y2="278" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
  <line x1="314" y1="162" x2="300" y2="176" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
  <line x1="212" y1="264" x2="198" y2="278" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Content lines in browser -->
  <rect x="100" y="310" width="200" height="12" rx="6" fill="#4a4a6a"/>
  <rect x="100" y="332" width="280" height="8" rx="4" fill="#3a3a5a"/>
  <rect x="100" y="348" width="240" height="8" rx="4" fill="#3a3a5a"/>
  <rect x="100" y="364" width="260" height="8" rx="4" fill="#3a3a5a"/>
  
  <!-- Cursor -->
  <polygon points="340,320 340,360 350,350" fill="#fff"/>
</svg>